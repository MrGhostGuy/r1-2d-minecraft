// === WORLD GENERATION ===
function noise(x){x=(x<<13)^x;return(1.0-((x*(x*x*15731+789221)+1376312589)&0x7fffffff)/1073741824.0);}
function smoothNoise(x){return noise(Math.floor(x))/2+noise(Math.floor(x)-1)/4+noise(Math.floor(x)+1)/4;}
function interpNoise(x){var ix=Math.floor(x),f=x-ix;f=f*f*(3-2*f);return smoothNoise(ix)*(1-f)+smoothNoise(ix+1)*f;}

function generateWorld(){
world=[];
for(var x=0;x<WORLD_W;x++){world[x]=[];for(var y=0;y<WORLD_H;y++)world[x][y]=BLOCKS.AIR;}
var seed=Math.random()*10000;
for(var x=0;x<WORLD_W;x++){
var h=Math.floor(SEA+octaveNoise((x+seed)*0.02,4)*12);
var biome=getBiome(x,seed);
// Surface
for(var y=h;y<WORLD_H;y++){
if(y==h){
if(biome==0)world[x][y]=BLOCKS.GRASS;
else if(biome==1)world[x][y]=BLOCKS.GRASS;
else if(biome==2)world[x][y]=BLOCKS.SAND;
else if(biome==3)world[x][y]=BLOCKS.SNOW;
else world[x][y]=BLOCKS.STONE;
}else if(y<h+4){
if(biome==2)world[x][y]=BLOCKS.SAND;
else world[x][y]=BLOCKS.DIRT;
}else if(y<WORLD_H-1){
world[x][y]=BLOCKS.STONE;
// Ores
var oreN=Math.random();
if(y>h+10&&oreN<0.01)world[x][y]=BLOCKS.DIAMOND_ORE;
else if(y>h+8&&oreN<0.03)world[x][y]=BLOCKS.GOLD_ORE;
else if(y>h+5&&oreN<0.06)world[x][y]=BLOCKS.IRON_ORE;
else if(y>h+3&&oreN<0.1)world[x][y]=BLOCKS.COAL_ORE;
else if(oreN<0.04)world[x][y]=BLOCKS.GRAVEL;
}else{world[x][y]=BLOCKS.BEDROCK;}
}
// Trees
if((biome==0||biome==1||biome==3)&&Math.random()<0.08&&x>2&&x<WORLD_W-2){
var th=Math.floor(Math.random()*3)+4;
for(var ty=1;ty<=th;ty++)if(h-ty>=0)world[x][h-ty]=BLOCKS.WOOD;
for(var lx=-2;lx<=2;lx++)for(var ly=-2;ly<=0;ly++){
var wx=x+lx,wy=h-th+ly;
if(wx>=0&&wx<WORLD_W&&wy>=0&&wy<WORLD_H&&world[wx][wy]==BLOCKS.AIR)world[wx][wy]=BLOCKS.LEAVES;
}
}
// Cactus in desert
if(biome==2&&Math.random()<0.04&&x>0&&x<WORLD_W-1){
var ch=Math.floor(Math.random()*2)+2;
for(var cy=1;cy<=ch;cy++)if(h-cy>=0)world[x][h-cy]=BLOCKS.CACTUS;
}
// Caves
for(var y=h+3;y<WORLD_H-2;y++){
var cv=octaveNoise((x+seed)*0.08,3)*0.5+octaveNoise((y+seed)*0.08,3)*0.5;
if(cv>0.4)world[x][y]=BLOCKS.AIR;
}
// Water in low areas
for(var y=0;y<WORLD_H;y++){
if(y>=SEA&&y<=SEA+2&&world[x][y]==BLOCKS.AIR)world[x][y]=BLOCKS.WATER;
}
}

player.x=WORLD_W/2*TILE;

}

function updatePlayer(dt){
var spd=1.2,grav=0.3,jumpF=-4.5,maxFall=5;

if(held.id>=100&&TOOL_POWER[held.id])power=TOOL_POWER[held.id];
miningProgress+=power*0.05;
if(miningProgress>=hard){
miningProgress=0;
var drop=DROPS[b]!==undefined?DROPS[b]:b;
if(drop!=0)addItem(drop,1);
world[bx][by]=BLOCKS.AIR;
// Particles
for(var i=0;i<3;i++)particles.push({x:bx*TILE+4,y:by*TILE+4,vx:(Math.random()-0.5)*2,vy:-Math.random()*2,life:20,color:BCOLORS[b]||'#fff'});
}
}

var bx=cursorX,by=cursorY;
if(bx<0||bx>=WORLD_W||by<0||by>=WORLD_H)return;
if(world[bx][by]!=BLOCKS.AIR&&world[bx][by]!=BLOCKS.WATER)return;
var px=Math.floor(player.x/TILE),py=Math.floor(player.y/TILE);
var dist=Math.abs(bx-px)+Math.abs(by-py);if(dist>5)return;

var held=getHeldItem();
if(held.id>0&&held.id<100){
world[bx][by]=held.id;
held.count--;if(held.count<=0){held.id=0;held.count=0;}
}
}

var held=getHeldItem();
if(FOOD_HEAL[held.id]&&player.hp<player.maxHp){
player.hp=Math.min(player.maxHp,player.hp+FOOD_HEAL[held.id]);
held.count--;if(held.count<=0){held.id=0;held.count=0;}
}
}

e.vy+=0.3;if(e.vy>5)e.vy=5;

if(etx>=0&&etx<WORLD_W&&ety>=0&&ety<WORLD_H&&isSolid(etx,ety)){e.vy=-3.5;}
// Apply movement
e.x+=e.vx;e.y+=e.vy;
// Ground collision
var gty=Math.floor((e.y+e.h)/TILE);
var gtx=Math.floor((e.x+e.w/2)/TILE);
if(gtx>=0&&gtx<WORLD_W&&gty>=0&&gty<WORLD_H&&isSolid(gtx,gty)){e.y=gty*TILE-e.h;e.vy=0;}
// Attack player
var adx=Math.abs(player.x-e.x),ady=Math.abs(player.y-e.y);
if(adx<10&&ady<14&&gameMode=='survival'){
e.atkTimer++;
if(e.atkTimer>30){e.atkTimer=0;player.hp-=e.type=='zombie'?3:2;if(player.hp<=0)gameOver();}
}
// Remove if too far or dead
if(e.hp<=0||Math.abs(e.x-player.x)>300*TILE){
if(e.hp<=0){addItem(e.type=='zombie'?ITEMS.RAW_PORK:ITEMS.STICK,Math.floor(Math.random()*2)+1);}
entities.splice(i,1);
}
}
}
function attackEntity(){
var held=getHeldItem();var dmg=1;
if(SWORD_DMG[held.id])dmg=SWORD_DMG[held.id];
for(var i=0;i<entities.length;i++){
var e=entities[i];
var adx=Math.abs(player.x-e.x),ady=Math.abs(player.y-e.y);
if(adx<16&&ady<16){e.hp-=dmg;e.vx=player.dir*3;e.vy=-2;player.attacking=10;break;}
}
}
// === DAY-NIGHT CYCLE ===
function updateDayNight(){
dayTime=(dayTime+1)%dayLength;
isNight=dayTime>dayLength/2;
}
function getSkyColor(){
var t=dayTime/dayLength;
if(t<0.25)return'rgb(100,170,255)';
if(t<0.4){var f=(t-0.25)/0.15;return'rgb('+Math.floor(100+155*f)+','+Math.floor(170-100*f)+','+Math.floor(255-155*f)+')';}
if(t<0.5){var f=(t-0.4)/0.1;return'rgb('+Math.floor(255-245*f)+','+Math.floor(70-60*f)+','+Math.floor(100-90*f)+')';}
if(t<0.75)return'rgb(10,10,30)';
if(t<0.9){var f=(t-0.75)/0.15;return'rgb('+Math.floor(10+245*f)+','+Math.floor(10+60*f)+','+Math.floor(30+70*f)+')';}
var f=(t-0.9)/0.1;return'rgb('+Math.floor(255-155*f)+','+Math.floor(70+100*f)+','+Math.floor(100+155*f)+')';
}
function gameOver(){gameState='dead';}
// === RENDERING ===
var zoomLevel=1.0,zoomPanelOpen=false;
function toggleZoom(){zoomPanelOpen=!zoomPanelOpen;var p=document.getElementById('zoom-panel');if(zoomPanelOpen)p.classList.add('open');else p.classList.remove('open');}
function setZoom(v){zoomLevel=parseFloat(v);document.getElementById('zoom-label').textContent=zoomLevel.toFixed(1)+'x';}
function render(){
if(!ctx)return;
// Camera
camX=player.x-W/2+player.w/2;camY=player.y-H/2+player.h/2;
if(camX<0)camX=0;if(camX>WORLD_W*TILE-W)camX=WORLD_W*TILE-W;
if(camY<0)camY=0;if(camY>WORLD_H*TILE-H)camY=WORLD_H*TILE-H;
// Sky
ctx.save();ctx.translate(W/2,H/2);ctx.scale(zoomLevel,zoomLevel);ctx.translate(-W/2,-H/2);ctx.fillStyle=getSkyColor();ctx.fillRect(0,0,W,H);
// Stars at night
if(isNight){ctx.fillStyle='#fff';for(var i=0;i<20;i++){var sx=(i*73+17)%W,sy=(i*41+7)%(H/2);ctx.fillRect(sx,sy,1,1);}}
// Blocks
var sx=Math.floor(camX/TILE),sy=Math.floor(camY/TILE);
var ex=sx+Math.ceil(W/TILE)+1,ey=sy+Math.ceil(H/TILE)+1;
for(var x=sx;x<ex&&x<WORLD_W;x++){for(var y=sy;y<ey&&y<WORLD_H;y++){
if(x<0||y<0)continue;
var b=world[x][y];if(b==BLOCKS.AIR)continue;
var dx=x*TILE-camX,dy=y*TILE-camY;
ctx.fillStyle=BCOLORS[b]||'#f0f';
if(b==BLOCKS.WATER){ctx.globalAlpha=0.5;ctx.fillRect(dx,dy,TILE,TILE);ctx.globalAlpha=1;}
else if(b==BLOCKS.TORCH){ctx.fillStyle='#8B5A2B';ctx.fillRect(dx+3,dy+2,2,6);ctx.fillStyle='#FFD700';ctx.fillRect(dx+2,dy,4,3);}
else if(b==BLOCKS.LEAVES){ctx.fillRect(dx,dy,TILE,TILE);ctx.fillStyle='#196619';ctx.fillRect(dx+1,dy+1,2,2);ctx.fillRect(dx+5,dy+4,2,2);}
else{ctx.fillRect(dx,dy,TILE,TILE);
// Block detail
if(b==BLOCKS.GRASS){ctx.fillStyle='#2d6b1e';ctx.fillRect(dx,dy,TILE,2);}
if(b==BLOCKS.STONE){ctx.fillStyle='#707070';ctx.fillRect(dx+2,dy+2,3,2);}
if(b==BLOCKS.COAL_ORE){ctx.fillStyle='#222';ctx.fillRect(dx+2,dy+2,3,3);}
if(b==BLOCKS.IRON_ORE){ctx.fillStyle='#DAA520';ctx.fillRect(dx+1,dy+2,2,2);ctx.fillRect(dx+5,dy+5,2,2);}
if(b==BLOCKS.GOLD_ORE){ctx.fillStyle='#FFD700';ctx.fillRect(dx+2,dy+3,3,2);}
if(b==BLOCKS.DIAMOND_ORE){ctx.fillStyle='#00FFFF';ctx.fillRect(dx+2,dy+2,2,2);ctx.fillRect(dx+5,dy+5,2,2);}
}
}}
// Night overlay
if(isNight){ctx.fillStyle='rgba(0,0,20,0.4)';ctx.fillRect(0,0,W,H);}
// Cursor highlight
var cx=cursorX*TILE-camX,cy=cursorY*TILE-camY;
ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1;ctx.strokeRect(cx,cy,TILE,TILE);
// Mining progress
if(miningProgress>0){
var b=world[cursorX]?world[cursorX][cursorY]:0;var hard=HARDNESS[b]||1;
ctx.fillStyle='rgba(255,0,0,0.5)';ctx.fillRect(cx,cy,TILE*(miningProgress/hard),2);
}
// Player
var px=player.x-camX,py=player.y-camY;
ctx.fillStyle='#a67c52';ctx.fillRect(px+1,py,4,4); // head
ctx.fillStyle='#2266aa';ctx.fillRect(px,py+4,6,5); // body
ctx.fillStyle='#1a1a8a';ctx.fillRect(px+1,py+9,2,3);ctx.fillRect(px+3,py+9,2,3); // legs
// Attack animation
if(player.attacking>0){
ctx.fillStyle='#aaa';
var ax=px+(player.dir>0?6:-4),ay=py+3;
ctx.fillRect(ax,ay,3,1);player.attacking--;
}
// Entities
for(var i=0;i<entities.length;i++){
var e=entities[i];var ex=e.x-camX,ey=e.y-camY;
ctx.fillStyle=e.color;ctx.fillRect(ex,ey,e.w,e.h);
ctx.fillStyle='#f00';ctx.fillRect(ex,ey-3,e.w*(e.hp/e.maxHp),2);
}
// Particles
for(var i=particles.length-1;i>=0;i--){
var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;
if(p.life<=0){particles.splice(i,1);continue;}
ctx.fillStyle=p.color;ctx.fillRect(p.x-camX,p.y-camY,2,2);
}
}
// === HUD ===
function renderHUD(){
var hb=document.getElementById('inv-bar');hb.innerHTML='';
for(var i=0;i<9;i++){
var s=inventory[i];var div=document.createElement('div');div.className='inv-slot'+(i==player.selectedSlot?' selected':'');
if(s.id>0){
var icon=document.createElement('div');icon.className='block-icon';
icon.style.background=s.id<100?BCOLORS[s.id]:(ICOLORS[s.id]||'#fff');
icon.style.width='14px';icon.style.height='14px';div.appendChild(icon);
var cnt=document.createElement('span');cnt.className='count';cnt.textContent=s.count>1?s.count:'';div.appendChild(cnt);
}
hb.appendChild(div);
}
// Health
if(gameMode=='survival'){
var hbar=document.getElementById('health-bar');hbar.innerHTML='';
for(var i=0;i<10;i++){
var h=document.createElement('span');h.style.fontSize='7px';
h.textContent=i<Math.ceil(player.hp/2)?'\u2764':'\u2661';
h.style.color=i<Math.ceil(player.hp/2)?'#f00':'#555';hbar.appendChild(h);
}
}
// Time
var td=document.getElementById('time-display');
var hr=Math.floor((dayTime/dayLength)*24);var ampm=hr>=12?'PM':'AM';
hr=hr%12;if(hr==0)hr=12;
td.textContent=(isNight?'\u263D':'\u2600')+' '+hr+ampm;
}
// === CRAFTING UI ===
function showCrafting(){
gameState='crafting';
var cs=document.getElementById('craft-screen');cs.style.display='block';
var rl=document.getElementById('recipe-list');rl.innerHTML='';
for(var r=0;r<RECIPES.length;r++){
var rec=RECIPES[r];var canCraft=true;
for(var j=0;j<rec.inp.length;j++){if(countItem(rec.inp[j][0])<rec.inp[j][1])canCraft=false;}
var div=document.createElement('div');div.className='recipe';
div.style.opacity=canCraft?'1':'0.4';
var nm=document.createElement('span');nm.className='r-name';
nm.textContent=rec.name+' x'+rec.cnt;div.appendChild(nm);
var cost=document.createElement('span');cost.className='r-cost';
var costStr='';for(var j=0;j<rec.inp.length;j++){
var iid=rec.inp[j][0];costStr+=(BNAMES[iid]||INAMES[iid]||'?')+'x'+rec.inp[j][1]+' ';
}
cost.textContent=costStr;div.appendChild(cost);
if(canCraft){(function(rec){div.onclick=function(){craftItem(rec);};})(rec);}
rl.appendChild(div);
}
}
function hideCrafting(){gameState='playing';document.getElementById('zoom-btn').style.display='block';document.getElementById('craft-screen').style.display='none';}
function craftItem(rec){
for(var j=0;j<rec.inp.length;j++){if(countItem(rec.inp[j][0])<rec.inp[j][1])return;}
for(var j=0;j<rec.inp.length;j++){removeItem(rec.inp[j][0],rec.inp[j][1]);}
addItem(rec.out,rec.cnt);
showCrafting();
}
// === CONTROLS ===
// Keyboard
document.addEventListener('keydown',function(e){
if(gameState=='title')return;
if(e.key=='ArrowLeft'||e.key=='a')keys.left=true;
if(e.key=='ArrowRight'||e.key=='d')keys.right=true;
if(e.key=='ArrowUp'||e.key=='w'||e.key==' ')keys.up=true;
if(e.key=='ArrowDown'||e.key=='s')keys.down=true;
if(e.key=='q')mineBlock();
if(e.key=='e')placeBlock();
if(e.key=='f')attackEntity();
if(e.key=='r')eatFood();
if(e.key=='c'){if(gameState=='crafting')hideCrafting();else showCrafting();}
if(e.key=='Escape'){if(gameState=='crafting')hideCrafting();}
if(e.key>='1'&&e.key<='9')player.selectedSlot=parseInt(e.key)-1;
e.preventDefault();
});
document.addEventListener('keyup',function(e){
if(e.key=='ArrowLeft'||e.key=='a')keys.left=false;
if(e.key=='ArrowRight'||e.key=='d')keys.right=false;
if(e.key=='ArrowUp'||e.key=='w'||e.key==' ')keys.up=false;
if(e.key=='ArrowDown'||e.key=='s')keys.down=false;
});
// R1 Hardware: Scroll wheel
window.addEventListener('scrollUp',function(){
if(gameState=='crafting'){document.getElementById('craft-screen').scrollTop-=30;return;}
player.selectedSlot=(player.selectedSlot-1+9)%9;
});
window.addEventListener('scrollDown',function(){
if(gameState=='crafting'){document.getElementById('craft-screen').scrollTop+=30;return;}
player.selectedSlot=(player.selectedSlot+1)%9;
});
// R1 Hardware: Side button
window.addEventListener('sideClick',function(){
if(gameState=='title'){startGame('survival');return;}
if(gameState=='crafting'){hideCrafting();return;}
if(gameState=='dead'){restartGame();return;}
var bx=cursorX,by=cursorY;if(bx>=0&&bx<WORLD_W&&by>=0&&by<WORLD_H){if(world[bx][by]!=BLOCKS.AIR&&world[bx][by]!=BLOCKS.WATER&&world[bx][by]!=BLOCKS.BEDROCK){mineBlock();}else{placeBlock();}}
});
var sideHoldTimer=null;
window.addEventListener('longPressStart',function(){
sideHoldTimer=setTimeout(function(){
if(gameState=='playing')showCrafting();
},500);
});
window.addEventListener('longPressEnd',function(){
if(sideHoldTimer){clearTimeout(sideHoldTimer);sideHoldTimer=null;}
});
// Touch controls
var touchMode='move';
document.addEventListener('touchstart',function(e){
e.preventDefault();var t=e.touches[0];touchStartX=t.clientX;touchStartY=t.clientY;touchActive=true;
var sx=t.clientX,sy=t.clientY;var ux=(sx-W/2)/zoomLevel+W/2;var uy=(sy-H/2)/zoomLevel+H/2;var tx=Math.floor((ux+camX)/TILE),ty=Math.floor((uy+camY)/TILE);
if(tx>=0&&tx<WORLD_W&&ty>=0&&ty<WORLD_H){cursorX=tx;cursorY=ty;}
},{passive:false});
document.addEventListener('touchmove',function(e){
e.preventDefault();if(!touchActive)return;var t=e.touches[0];
var dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
if(Math.abs(dx)>8){keys.left=dx<0;keys.right=dx>0;}
if(dy<-15){keys.up=true;}
},{passive:false});
document.addEventListener('touchend',function(e){
e.preventDefault();touchActive=false;keys.left=false;keys.right=false;keys.up=false;keys.down=false;
},{passive:false});
// === GAME LOOP ===
function startGame(mode){
gameMode=mode;gameState='playing';
document.getElementById('title').style.display='none';
canvas=document.getElementById('game');ctx=canvas.getContext('2d');


generateWorld();
if(mode=='creative'){for(var b=1;b<=22;b++)if(b!=14&&b!=13)addItem(b,64);}
else{addItem(BLOCKS.WOOD,10);addItem(BLOCKS.PLANKS,5);}
lastTime=performance.now();
requestAnimationFrame(gameLoop);
}
function restartGame(){
gameState='playing';player.hp=player.maxHp;
entities=[];particles=[];miningProgress=0;
inventory=[];for(var i=0;i<36;i++)inventory.push({id:0,count:0});
generateWorld();
if(gameMode=='creative'){for(var b=1;b<=22;b++)if(b!=14&&b!=13)addItem(b,64);}
else{addItem(BLOCKS.WOOD,10);addItem(BLOCKS.PLANKS,5);}
}
function resumeGame(){gameState='playing';document.getElementById('pause-menu').style.display='none';}
function gameLoop(now){
dt=(now-lastTime)/16.67;if(dt>3)dt=3;lastTime=now;
if(gameState=='playing'){
updatePlayer(dt);updateDayNight();spawnEnemies();updateEntities(dt);
if(miningTarget.x!=cursorX||miningTarget.y!=cursorY){miningProgress=0;miningTarget.x=cursorX;miningTarget.y=cursorY;}
render();ctx.restore();renderHUD();
}
if(gameState=='dead'){
ctx.fillStyle='rgba(200,0,0,0.3)';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#fff';ctx.font='14px monospace';ctx.fillText('YOU DIED',80,120);
ctx.font='8px monospace';ctx.fillText('Tap or press to respawn',55,145);
}
requestAnimationFrame(gameLoop);
}
// Double-tap to place, single tap to mine on touch
document.getElementById('game').addEventListener('click',function(e){
if(gameState!='playing')return;
var rect=canvas.getBoundingClientRect();
var mx=e.clientX-rect.left,my=e.clientY-rect.top;
cursorX=Math.floor((mx+camX)/TILE);cursorY=Math.floor((my+camY)/TILE);
if(cursorX>=0&&cursorX<WORLD_W&&cursorY>=0&&cursorY<WORLD_H){
if(world[cursorX][cursorY]!=BLOCKS.AIR&&world[cursorX][cursorY]!=BLOCKS.WATER)mineBlock();
else placeBlock();
}
});
</script>
